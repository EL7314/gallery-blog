{% extends 'blog/base.html' %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="login-page">
    <h1>登录</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <ul class="errorlist">{% for e in form.non_field_errors %}<li>{{ e }}</li>{% endfor %}</ul>
        {% endif %}
        <input type="text" name="username" class="input" placeholder="用户名" required>
        <input type="password" name="password" class="input" placeholder="密码" required>
        <button type="submit" class="btn" style="width:100%;">登录</button>
    </form>
    <p style="text-align:center;margin-top:12px;"><a href="{% url 'blog:index' %}">← 返回首页</a></p>
</div>
{% endblock %}
