{% extends 'blog/base.html' %}
{% block title %}{{ action }}分类{% endblock %}
{% block content %}
<div class="form-page">
    <h1>{{ action }}分类</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.name }}
        <button type="submit" class="btn">{{ action }}</button>
        <a href="{% url 'blog:category_list' %}" class="btn btn-outline" style="margin-left:8px;">取消</a>
    </form>
</div>
{% endblock %}
